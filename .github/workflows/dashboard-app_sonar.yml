name: Dashboard App SonarQube Analysis

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: SonarQube Analysis
        run: ./mvn sonar -Dsonar.token=${{ secrets.SONAR_TOKEN }}