spring:

  config:
    import: "optional:configserver:"

  cloud:
    config:
      enabled: false
      discovery:
        enabled: false
    discovery:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        show_sql: true
        format_sql: true
  datasource:
    initialization-mode: always
    schema: classpath:init-schema.sql
    data: classpath:init-data.sql

eureka:
  instance:
    hostname: localhost
  client:
    fetchRegistry: false
    registerWithEureka: false